<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Log - Shopee HR</title>
    <link rel="stylesheet" href="Shoppehr.css" />
    <style>
        .activity-card {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 40px;
            height: 40px;
            background: #f1f5f9;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .activity-details {
            display: flex;
            flex-direction: column;
        }

        .activity-title {
            font-weight: 600;
            color: #1e293b;
        }

        .activity-time {
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>

<body style="background: #f1f5f9;">
    <div class="container" style="display: block; max-width: 800px; margin: 40px auto; padding: 20px;">
        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 30px;">
            <button onclick="history.back()"
                style="background: #fff; border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">&lsaquo;</button>
            <h1 style="margin: 0; font-size: 1.5rem; color: #1e293b;">Activity Log</h1>
        </div>

        <div class="activity-card">
            <div id="activityList">
                <div style="padding: 20px; text-align: center; color: #64748b;">Loading activity...</div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const session = Auth.requireAuth();
        const list = document.getElementById('activityList');

        // Note: In this simple implementation, we just show the last_activity from session/db
        async function loadActivity() {
            // Simulated activity based on last_activity
            const lastActivity = session.last_activity || new Date().toISOString();
            const formattedDate = new Date(lastActivity).toLocaleString();

            list.innerHTML = `
                <div class="activity-item">
                    <div class="activity-icon">🔓</div>
                    <div class="activity-details">
                        <span class="activity-title">Logged in to Shopee HR</span>
                        <span class="activity-time">${formattedDate}</span>
                    </div>
                </div>
                <div class="activity-item">
                    <div class="activity-icon">👤</div>
                    <div class="activity-details">
                        <span class="activity-title">Viewed Profile</span>
                        <span class="activity-time">Earlier today</span>
                    </div>
                </div>
            `;
        }
        loadActivity();
    </script>
</body>

</html>
