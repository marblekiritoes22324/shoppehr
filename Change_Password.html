<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Password - Shopee HR</title>
    <link rel="stylesheet" href="Shoppehr.css" />
</head>

<body
    style="background: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">
    <div
        style="background: #fff; width: 100%; max-width: 440px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;">
        <div style="padding: 30px; text-align: center; border-bottom: 1px solid #f1f5f9;">
            <h2 style="margin: 0; color: #1e293b;">Change Password</h2>
            <p style="margin: 10px 0 0; color: #64748b; font-size: 0.9rem;">Update your security credentials</p>
        </div>

        <form id="changePasswordForm" style="padding: 30px; display: flex; flex-direction: column; gap: 20px;">
            <div class="form-group-password">
                <label>Current Password</label>
                <input type="password" name="current_password" required placeholder="••••••••">
            </div>
            <div class="form-group-password">
                <label>New Password</label>
                <input type="password" name="new_password" required placeholder="••••••••">
            </div>
            <div class="form-group-password">
                <label>Confirm New Password</label>
                <input type="password" name="confirm_password" required placeholder="••••••••">
            </div>

            <div id="message"
                style="display: none; padding: 12px; border-radius: 8px; font-size: 0.85rem; text-align: center;"></div>

            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button type="button" onclick="history.back()"
                    style="flex: 1; padding: 12px; background: #f1f5f9; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; color: #64748b;">Cancel</button>
                <button type="submit"
                    style="flex: 2; padding: 12px; background: #6366f1; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; color: #fff;">Update
                    Password</button>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
    <script>
        Auth.requireAuth();

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageEl = document.getElementById('message');
            const data = {
                current_password: e.target.current_password.value,
                new_password: e.target.new_password.value,
                confirm_password: e.target.confirm_password.value
            };

            if (data.new_password !== data.confirm_password) {
                messageEl.textContent = "New passwords do not match!";
                messageEl.style.display = 'block';
                messageEl.style.background = '#fee2e2';
                messageEl.style.color = '#ef4444';
                return;
            }

            try {
                const response = await fetch('change_password_backend.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();

                messageEl.textContent = result.message;
                messageEl.style.display = 'block';

                if (result.success) {
                    messageEl.style.background = '#ecfdf5';
                    messageEl.style.color = '#10b981';
                    setTimeout(() => history.back(), 2000);
                } else {
                    messageEl.style.background = '#fee2e2';
                    messageEl.style.color = '#ef4444';
                }
            } catch (err) {
                messageEl.textContent = "Error connecting to server.";
                messageEl.style.display = 'block';
                messageEl.style.background = '#fee2e2';
                messageEl.style.color = '#ef4444';
            }
        });
    </script>
</body>

</html>
